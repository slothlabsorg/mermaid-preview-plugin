<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Mermaid Preview</title>
<style>
  :root {
    --bg: #1e1f22;
    --surface: #2b2d30;
    --surface-hi: #36383c;
    --border: #3b3d40;
    --text: #dfe1e5;
    --text-dim: #9ca0a4;
    --accent: #6e87ff;
    --mono: ui-monospace, SFMono-Regular, Menlo, "JetBrains Mono", monospace;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f7f8fa;
      --surface: #ffffff;
      --surface-hi: #eef0f3;
      --border: #d7dbe0;
      --text: #1e1f22;
      --text-dim: #5a5f66;
    }
  }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 13px;
  }
  #status {
    padding: 10px 14px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  #status strong {
    color: var(--text);
  }
  #blocks {
    padding: 12px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--surface-hi);
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .card-header:hover {
    background: var(--border);
  }
  .card-title {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
  }
  .card-title strong {
    color: var(--text);
  }
  .toggle {
    display: inline-flex;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    font-size: 11px;
  }
  .toggle button {
    background: transparent;
    color: var(--text-dim);
    border: none;
    padding: 4px 10px;
    cursor: pointer;
    font: inherit;
  }
  .toggle button.active {
    background: var(--accent);
    color: white;
  }
  .toggle button:hover:not(.active) {
    color: var(--text);
  }
  .actions {
    display: inline-flex;
    gap: 4px;
    margin-left: 8px;
  }
  .actions button {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    font: inherit;
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
  }
  .actions button:hover {
    color: var(--text);
    border-color: var(--accent);
  }
  .actions button:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .card-body {
    padding: 12px;
    overflow: auto;
  }
  .card-body pre {
    margin: 0;
    font-family: var(--mono);
    font-size: 12px;
    white-space: pre;
    color: var(--text);
  }
  .card-body.diagram {
    display: flex;
    justify-content: center;
    background: var(--surface);
  }
  .card-body.diagram svg {
    max-width: 100%;
    height: auto;
  }
  .empty {
    padding: 40px 14px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
  }
  .empty svg {
    opacity: 0.4;
    margin-bottom: 10px;
  }
  .error {
    color: #f28b82;
    font-family: var(--mono);
    font-size: 11px;
    padding: 10px 12px;
    background: rgba(242, 139, 130, 0.12);
    border-left: 3px solid #f28b82;
    border-radius: 4px;
    margin-bottom: 10px;
  }
  .error strong { color: #f28b82; }
  .err-msg { color: var(--text-dim); white-space: pre-wrap; font-size: 11px; display: block; margin-top: 4px; }
  .card-body pre .line { display: block; }
  .card-body pre .ln {
    display: inline-block;
    width: 3ch;
    padding-right: 10px;
    color: var(--text-dim);
    user-select: none;
    text-align: right;
  }
  .card-body pre .err-line {
    background: rgba(242, 139, 130, 0.18);
    border-left: 3px solid #f28b82;
    margin-left: -3px;
    padding-left: 0;
  }
  .card-body pre .err-line .ln {
    color: #f28b82;
    font-weight: bold;
  }
</style>
</head>
<body>
<div id="status">Waiting for Markdown file…</div>
<div id="blocks"></div>

<script src="./mermaid.min.js"></script>
<script>
  const isDark = !window.matchMedia("(prefers-color-scheme: light)").matches;
  mermaid.initialize({
    startOnLoad: false,
    theme: isDark ? "dark" : "default",
    securityLevel: "loose",
    flowchart: { htmlLabels: true },
  });

  let currentBlocks = [];
  const viewState = new Map();
  window.__svgs = {};  // base64url-encoded SVG per block index (for Kotlin download)
  window.__pngs = {};  // data URL PNG per block index (for Kotlin download)

  window.setPayload = async function(payload) {
    const savedScroll = window.scrollY;
    const status = document.getElementById("status");
    const container = document.getElementById("blocks");
    container.innerHTML = "";

    if (payload.status === "no-file") {
      status.innerHTML = "Open a Markdown file to preview its Mermaid blocks.";
      return;
    }
    if (payload.status === "not-markdown") {
      status.innerHTML = `<strong>${escapeHtml(payload.fileName)}</strong> is not a Markdown file.`;
      return;
    }
    const n = payload.blocks.length;
    status.innerHTML = n === 0
      ? `<strong>${escapeHtml(payload.fileName)}</strong> — no mermaid blocks.`
      : `<strong>${escapeHtml(payload.fileName)}</strong> — ${n} mermaid block${n === 1 ? "" : "s"}.`;

    currentBlocks = payload.blocks;
    const renderPromises = [];
    for (const block of payload.blocks) {
      const { card, rendered } = renderCard(block);
      container.appendChild(card);
      renderPromises.push(rendered);
    }
    await Promise.allSettled(renderPromises);
    // Restore scroll after all async renders complete
    requestAnimationFrame(() => window.scrollTo({ top: savedScroll, behavior: "instant" }));
  };

  // Returns { card, rendered: Promise } so setPayload can await all renders for scroll restore.
  function renderCard(block) {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.index = String(block.index);

    const view = viewState.get(block.index) || "diagram";

    card.innerHTML = `
      <div class="card-header" title="Click to jump to line ${block.startLine} in the editor" style="cursor:pointer;">
        <div class="card-title">Block <strong>#${block.index + 1}</strong> · line ${block.startLine}</div>
        <div style="display:flex;align-items:center;">
          <div class="toggle">
            <button data-view="diagram" class="${view === "diagram" ? "active" : ""}">Diagram</button>
            <button data-view="code" class="${view === "code" ? "active" : ""}">Code</button>
          </div>
          <div class="actions">
            <button data-export="svg" title="Download as SVG">SVG</button>
            <button data-export="png" title="Download as PNG">PNG</button>
            <button data-export="copy" title="Copy mermaid source">Copy</button>
          </div>
        </div>
      </div>
      <div class="card-body ${view}"></div>
    `;

    // Click-to-jump: change document.title — Kotlin's CefDisplayHandler intercepts it.
    card.querySelector(".card-header").addEventListener("click", e => {
      if (e.target.closest("button")) return;
      document.title = "mermaid://navigate/" + block.index + "/" + Date.now();
    });

    for (const btn of card.querySelectorAll(".toggle button")) {
      btn.addEventListener("click", () => {
        const next = btn.dataset.view;
        viewState.set(block.index, next);
        for (const b of card.querySelectorAll(".toggle button")) b.classList.toggle("active", b === btn);
        const body = card.querySelector(".card-body");
        body.className = "card-body " + next;
        drawBody(body, block, next);
      });
    }

    for (const btn of card.querySelectorAll(".actions button")) {
      btn.addEventListener("click", () => onExport(card, block, btn));
    }

    const rendered = drawBody(card.querySelector(".card-body"), block, view);
    return { card, rendered };
  }

  async function onExport(card, block, btn) {
    const kind = btn.dataset.export;
    if (kind === "copy") {
      try { await navigator.clipboard.writeText(block.code); flash(btn, "Copied!"); }
      catch (e) { flash(btn, "Failed"); }
      return;
    }
    const safeName = `block-${block.index + 1}-line-${block.startLine}`;
    if (kind === "svg" || kind === "png") {
      // Signal Kotlin via title — Kotlin replies by reading the stored __svgs/__pngs.
      document.title = `mermaid://download/${kind}/${block.index}/${safeName}.${kind}`;
      flash(btn, kind.toUpperCase() + " ↓");
    }
  }


  function getSvgSize(svgString) {
    try {
      const doc = new DOMParser().parseFromString(svgString, "image/svg+xml");
      const el = doc.querySelector("svg");
      if (!el) return { w: 800, h: 600 };
      const vb = el.getAttribute("viewBox");
      if (vb) {
        const p = vb.trim().split(/[\s,]+/).map(Number);
        if (p.length >= 4) return { w: Math.ceil(p[2]) || 800, h: Math.ceil(p[3]) || 600 };
      }
      return { w: parseFloat(el.getAttribute("width")) || 800, h: parseFloat(el.getAttribute("height")) || 600 };
    } catch { return { w: 800, h: 600 }; }
  }

  function svgToPngDataUrl(svgString, scale = 2) {
    return new Promise(resolve => {
      const img = new Image();
      const svgBlob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(svgBlob);
      img.onload = () => {
        const { w, h } = getSvgSize(svgString);
        const canvas = document.createElement("canvas");
        canvas.width = w * scale;
        canvas.height = h * scale;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = getComputedStyle(document.body).backgroundColor || "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.setTransform(scale, 0, 0, scale, 0, 0);
        ctx.drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        resolve(canvas.toDataURL("image/png"));
      };
      img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
      img.src = url;
    });
  }

  function flash(btn, text) {
    const prev = btn.textContent;
    btn.textContent = text;
    btn.disabled = true;
    setTimeout(() => { btn.textContent = prev; btn.disabled = false; }, 1200);
  }

  async function drawBody(bodyEl, block, view) {
    bodyEl.innerHTML = "";
    const parseError = await parseError_(block.code);

    if (parseError) {
      renderErrorWithSource(bodyEl, block, parseError);
      return;
    }

    if (view === "code") {
      renderCodeView(bodyEl, block, null);
    } else {
      const id = `mermaid-${Date.now()}-${block.index}`;
      try {
        const { svg } = await mermaid.render(id, block.code);
        bodyEl.innerHTML = svg;

        // Store for Kotlin downloads (title channel)
        const b64svg = b64url(svg);
        window.__svgs[block.index] = b64svg;
        // Notify Kotlin's SVG cache for inlay manager
        document.title = "mermaid://svgcache/" + block.index + "/" + b64svg;

        // Pre-compute PNG at 1x to keep base64 size manageable
        svgToPngDataUrl(svg, 1).then(dataUrl => {
          if (dataUrl) window.__pngs[block.index] = dataUrl;
        });
      } catch (err) {
        renderErrorWithSource(bodyEl, block, err);
      }
    }
  }

  function b64url(str) {
    return btoa(unescape(encodeURIComponent(str)))
      .replace(/\+/g, "-").replace(/\//g, "_").replace(/=/g, "");
  }

  async function parseError_(code) {
    try {
      await mermaid.parse(code);
      return null;
    } catch (e) {
      return e;
    }
  }

  function renderCodeView(bodyEl, block, errLineNumber) {
    const pre = document.createElement("pre");
    const lines = block.code.split("\n");
    pre.innerHTML = lines.map((line, i) => {
      const lineNo = i + 1;
      const esc = escapeHtml(line);
      const highlight = errLineNumber === lineNo;
      return `<span class="line${highlight ? " err-line" : ""}"><span class="ln">${String(lineNo).padStart(3, " ")}</span>${esc}</span>`;
    }).join("\n");
    bodyEl.appendChild(pre);
  }

  function renderErrorWithSource(bodyEl, block, err) {
    const message = String(err && (err.str || err.message) || err);
    const lineNo = extractLineNumber(message);

    const header = document.createElement("div");
    header.className = "error";
    header.innerHTML = `<strong>Syntax error</strong>${lineNo ? ` at line <strong>${lineNo}</strong> of block` : ""}<br><span class="err-msg">${escapeHtml(message)}</span>`;
    bodyEl.appendChild(header);

    renderCodeView(bodyEl, block, lineNo);
  }

  function extractLineNumber(message) {
    // mermaid errors look like "Parse error on line 7:" or "...at line 5..."
    const m = message.match(/line\s+(\d+)/i);
    return m ? parseInt(m[1], 10) : null;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
  }
</script>
</body>
</html>
